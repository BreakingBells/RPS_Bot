<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<style>
    body {
        background: #f2f2f2;
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    .subtitle {
        text-align: center;
        font-size: 14px;
        color: #555;
        margin-bottom: 20px;
    }

    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        border: 1px solid #ccc;
        padding: 20px;
    }

    .scoreboard {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .score {
        background: #fff;
        border: 1px solid #aaa;
        padding: 10px;
        width: 30%;
        text-align: center;
    }

    .score .label {
        font-size: 12px;
        color: #666;
    }

    .score .value {
        font-size: 22px;
        font-weight: bold;
    }

    .arena {
        border: 1px solid #aaa;
        padding: 15px;
        margin-bottom: 20px;
        background: #fafafa;
        text-align: center;
    }

    .moves {
        display: flex;
        justify-content: space-around;
        margin-bottom: 10px;
    }

    .move-emoji {
        font-size: 50px;
    }

    .controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
    }

    .btn-move {
        width: 32%;
        padding: 10px;
        background: #e0e0e0;
        border: 1px solid #888;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }

    .btn-move:hover {
        background: #d0d0d0;
    }

    .footer-actions {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        color: #555;
    }

    .btn-reset {
        padding: 5px 10px;
        background: #eee;
        border: 1px solid #888;
        cursor: pointer;
    }

    .btn-reset:hover {
        background: #ddd;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Rock Paper Scissors</h1>
    <div class="scoreboard">
        <div class="score">
            <div class="label">You</div>
            <div class="value" id="score-you">0</div>
        </div>
        <div class="score">
            <div class="label">Ties</div>
            <div class="value" id="score-tie">0</div>
        </div>
        <div class="score">
            <div class="label">Computer</div>
            <div class="value" id="score-cpu">0</div>
        </div>
    </div>

    <div class="arena">
        <div class="moves">
            <div>
                <div>You</div>
                <div class="move-emoji" id="user-move">❔</div>
            </div>
            <div>
                <div>Computer</div>
                <div class="move-emoji" id="cpu-move">❔</div>
            </div>
        </div>

        <div id="result">Make your move</div>
        <div id="prediction" style="font-size:12px; color:#666; margin-top:5px;"></div>
    </div>

    <div class="controls">
        <button class="btn-move" data-move="r">✊ Rock</button>
        <button class="btn-move" data-move="p">✋ Paper</button>
        <button class="btn-move" data-move="s">✌️ Scissors</button>
    </div>

    <div class="footer-actions">
        <span id="round-info">Round 1 · 0 plays recorded</span>
        <button class="btn-reset" id="reset-btn">Reset</button>
    </div>
</div>

<script>
const STORAGE_KEY = "rps-history";
const SCORE_KEY = "rps-score";

const EMOJI = { r: "✊", p: "✋", s: "✌️" };
const NAME  = { r: "Rock", p: "Paper", s: "Scissors" };

let history = loadHistory();
let score = loadScore();

function loadHistory() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch {
        return [];
    }
}

function saveHistory() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function loadScore() {
    try {
        const raw = localStorage.getItem(SCORE_KEY);
        return raw ? JSON.parse(raw) : { you: 0, cpu: 0, tie: 0 };
    } catch {
        return { you: 0, cpu: 0, tie: 0 };
    }
}

function saveScore() {
    localStorage.setItem(SCORE_KEY, JSON.stringify(score));
}

function predictMove(hist) {
    if (hist.length === 0) {
        const moves = ["r", "p", "s"];
        return moves[Math.floor(Math.random() * 3)];
    }

    const freq = { r: 0, p: 0, s: 0 };
    for (const m of hist) freq[m] += 1;
    for (const m of hist.slice(-5)) freq[m] += 0.4;

    const transitions = {
        r: { r: 0, p: 0, s: 0 },
        p: { r: 0, p: 0, s: 0 },
        s: { r: 0, p: 0, s: 0 },
    };

    for (let i = 0; i < hist.length - 1; i++) {
        transitions[hist[i]][hist[i + 1]] += 1;
    }

    const last = hist[hist.length - 1];
    for (const move of ["r", "p", "s"]) {
        freq[move] += transitions[last][move] * 1.2;
    }

    let best = "r", bestScore = -Infinity;
    for (const move of ["r", "p", "s"]) {
        if (freq[move] > bestScore) {
            bestScore = freq[move];
            best = move;
        }
    }
    return best;
}

function counter(move) {
    if (move === "r") return "p";
    if (move === "p") return "s";
    if (move === "s") return "r";
}

function isWin(player, opponent) {
    return (
        (player === "r" && opponent === "s") ||
        (player === "s" && opponent === "p") ||
        (player === "p" && opponent === "r")
    );
}

const userMoveEl = document.getElementById("user-move");
const cpuMoveEl = document.getElementById("cpu-move");
const resultEl = document.getElementById("result");
const predictionEl = document.getElementById("prediction");
const roundInfoEl = document.getElementById("round-info");

function renderScore() {
    document.getElementById("score-you").textContent = score.you;
    document.getElementById("score-cpu").textContent = score.cpu;
    document.getElementById("score-tie").textContent = score.tie;

    roundInfoEl.textContent =
        `Round ${history.length + 1} · ${history.length} ${history.length === 1 ? "play" : "plays"} recorded`;
}

function play(userMove) {
    const predicted = predictMove(history);
    const cpuMove = counter(predicted);

    userMoveEl.textContent = EMOJI[userMove];
    cpuMoveEl.textContent = EMOJI[cpuMove];

    let outcome, cls;
    if (userMove === cpuMove) {
        outcome = "It's a tie";
        score.tie += 1;
    } else if (isWin(userMove, cpuMove)) {
        outcome = "You win!";
        score.you += 1;
    } else {
        outcome = "You lose";
        score.cpu += 1;
    }

    resultEl.textContent = outcome;

    if (history.length === 0) {
        predictionEl.textContent = "Computer's first move was random.";
    } else {
        predictionEl.textContent =
            `Computer predicted you'd play ${NAME[predicted]} and used ${NAME[cpuMove]}.`;
    }

    history.push(userMove);
    saveHistory();
    saveScore();
    renderScore();
}

document.querySelectorAll(".btn-move").forEach(btn => {
    btn.addEventListener("click", () => play(btn.dataset.move));
});

document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "r" || k === "p" || k === "s") play(k);
});

document.getElementById("reset-btn").addEventListener("click", () => {
    if (!confirm("Clear all history and reset the score?")) return;

    history = [];
    score = { you: 0, cpu: 0, tie: 0 };
    saveHistory();
    saveScore();

    userMoveEl.textContent = "❔";
    cpuMoveEl.textContent = "❔";
    resultEl.textContent = "Make your move";
    predictionEl.textContent = "";

    renderScore();
});

renderScore();
</script>

</body>
</html>
